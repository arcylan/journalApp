# Test configuration - Disable external services for testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.mongodb.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Mock external API keys for testing
weather.api.key=test-api-key-for-testing

# Logging for tests
logging.level.org.springframework.data.redis=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.level.org.springframework.mail=WARN 